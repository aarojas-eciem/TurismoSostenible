  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"89603167-1461-4fcb-9f87-b94f1a9b87f3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n\n*{margin:0;padding:0;box-sizing:border-box}\n:root{\n  --navy:#2C3350;--navy2:#46507A;--coral:#B75C3C;--gold:#C79A45;\n  --mint:#6E7A44;--lav:#6E5B87;--teal:#3E7B74;\n  --sand:#F1E8D8;--sand2:#F6EFE2;\n  --border:#E7DECE;--line-soft:rgba(42,36,32,0.07);\n  --bg:#FBF8F1;--white:#FFFFFF;\n  --text:#2A2420;--ink-soft:#4C4439;--muted:#8C8172;--sidebar:288px;\n  --serif:\"Spectral\",Georgia,serif;--sans:\"Hanken Grotesk\",system-ui,sans-serif;\n  --shadow:0 1px 2px rgba(60,44,28,.04),0 8px 24px -12px rgba(60,44,28,.10);\n  --shadow-lift:0 2px 6px rgba(60,44,28,.06),0 18px 40px -18px rgba(60,44,28,.22);\n}\nhtml{scroll-behavior:smooth}\nbody{margin:0}\n#dc-root{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased;letter-spacing:-0.003em}\n#dc-root ::selection{background:rgba(183,92,60,.20)}\n#dc-root *{scrollbar-width:thin;scrollbar-color:#d8cdb8 transparent}\n#dc-root *::-webkit-scrollbar{width:9px;height:9px}\n#dc-root *::-webkit-scrollbar-thumb{background:#dcd1bc;border-radius:9px;border:2px solid transparent;background-clip:content-box}\n#dc-root *::-webkit-scrollbar-thumb:hover{background:#cbbfa5;background-clip:content-box}\n\n/* ── SIDEBAR — cielo nocturno de Elqui ─────────────────────────────── */\n#sidebar{\n  width:var(--sidebar);min-width:var(--sidebar);height:100vh;position:sticky;top:0;\n  background:\n    radial-gradient(120% 60% at 100% 0%, rgba(199,154,69,.10), transparent 55%),\n    radial-gradient(90% 50% at 0% 100%, rgba(62,123,116,.14), transparent 60%),\n    linear-gradient(168deg,#31374F 0%,#292538 52%,#241f2c 100%);\n  color:#F3EFE6;display:flex;flex-direction:column;overflow-y:auto;\n  box-shadow:1px 0 0 rgba(0,0,0,.25), 8px 0 40px -20px rgba(0,0,0,.55);z-index:100;\n}\n.sb-brand{padding:30px 24px 22px;border-bottom:1px solid rgba(255,255,255,.09)}\n.sb-logo{font-family:var(--sans);font-size:9.5px;color:rgba(243,239,230,.5);letter-spacing:.16em;text-transform:uppercase;line-height:1.5;font-weight:600}\n.sb-title{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.22;margin-top:12px;letter-spacing:-0.01em;color:#fff}\n.sb-bip{font-size:10px;color:rgba(243,239,230,.42);margin-top:9px;font-family:var(--sans);letter-spacing:.02em}\n.sb-zone{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.09)}\n.sb-zone-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(243,239,230,.42);margin-bottom:11px;font-weight:700}\n.zone-btn{width:100%;text-align:left;padding:10px 13px;border-radius:11px;border:1px solid rgba(255,255,255,.10);\n  background:rgba(255,255,255,.015);color:#EDE8DE;font-family:var(--sans);font-size:12.5px;font-weight:500;\n  cursor:pointer;margin-bottom:6px;transition:background .18s,border-color .18s,transform .18s;display:flex;align-items:center;gap:10px;letter-spacing:-0.005em}\n.zone-btn .zd{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px rgba(255,255,255,.06)}\n.zone-btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18)}\n.zone-btn.active{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.32);box-shadow:inset 0 1px 0 rgba(255,255,255,.10)}\n.zone-btn:last-child{margin-bottom:0}\n.zd-c{background:#F1E8D8}.zd-v{background:var(--mint)}.zd-p{background:var(--coral)}\n.zd-todos{background:#F1E8D8}.zd-alta{background:var(--mint)}.zd-moderada{background:var(--gold)}.zd-baja{background:var(--coral)}\n\n.sb-nav{padding:16px 12px;flex:1}\n.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;font-size:12.5px;color:rgba(243,239,230,.62);\n  text-decoration:none;cursor:pointer;transition:color .18s,background .18s;border:none;background:none;width:100%;text-align:left;\n  font-family:var(--sans);border-radius:10px;letter-spacing:-0.005em;font-weight:500}\n.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}\n.nav-item.active{color:#fff;background:rgba(255,255,255,.10)}\n.nav-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;\n  background:rgba(255,255,255,.08);font-size:10px;font-weight:700;flex-shrink:0;transition:background .18s,color .18s;font-family:var(--serif);color:rgba(243,239,230,.75)}\n.nav-item.active .nav-num{background:var(--gold);color:#241f2c}\n.sb-footer{padding:16px 24px 22px;border-top:1px solid rgba(255,255,255,.09);font-size:10px;color:rgba(243,239,230,.38);line-height:1.7;letter-spacing:.01em}\n\n/* ── TOPBAR ────────────────────────────────────────────────────────── */\n#main{flex:1;overflow-y:auto;min-width:0;height:100vh}\n#topbar{position:sticky;top:0;z-index:50;background:rgba(251,248,241,.82);backdrop-filter:blur(16px) saturate(1.2);\n  border-bottom:1px solid var(--border);padding:15px 40px;display:flex;align-items:center;justify-content:space-between;gap:16px}\n.tb-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.01em}\n.tb-badges{display:flex;gap:8px;flex-wrap:wrap}\n.badge{padding:5px 13px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.01em;white-space:nowrap}\n.badge-zone{background:var(--navy);color:#F3EFE6}\n.badge-n{background:var(--white);color:var(--ink-soft);border:1px solid var(--border)}\n.badge-segmento{background:var(--gold);color:#33280f}\n\n/* ── MAIN / SECTIONS ───────────────────────────────────────────────── */\n.main-inner{padding:0 40px 64px;max-width:1360px}\n.section{padding:52px 0 0;scroll-margin-top:20px}\n.section:first-child{padding-top:38px}\n.sec-head{display:flex;align-items:baseline;gap:20px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}\n.sec-num{font-family:var(--serif);font-size:52px;font-weight:400;font-style:normal;color:var(--gold);line-height:.9;letter-spacing:-0.02em;flex-shrink:0}\n.sec-titles h2{font-family:var(--serif);font-size:25px;font-weight:600;color:var(--text);line-height:1.15;letter-spacing:-0.015em}\n.sec-titles p{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:.005em}\n\n/* ── KPI CARDS (sin barra superior tipo 'Claude') ──────────────────── */\n.indicador-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}\n.indicador{background:var(--white);border-radius:16px;padding:22px 22px 20px;border:1px solid var(--border);\n  position:relative;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column;gap:0}\n.indicador:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift);border-color:#dcd1bc}\n.indicador-val{font-family:var(--serif);font-size:38px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-0.02em}\n.indicador-label{font-size:11.5px;color:var(--ink-soft);margin-top:12px;font-weight:600;display:flex;align-items:center;gap:8px;letter-spacing:-0.005em}\n.indicador-label::before{content:\"\";width:9px;height:9px;border-radius:3px;background:var(--accent,var(--navy));flex-shrink:0}\n.indicador-sub{font-size:10px;color:var(--muted);margin-top:4px;padding-left:17px}\n\n/* ── CHART CARDS ───────────────────────────────────────────────────── */\n.chart-grid{display:grid;gap:20px;margin-bottom:20px}\n.g2{grid-template-columns:1fr 1fr}\n.g3{grid-template-columns:1fr 1fr 1fr}\n.g1{grid-template-columns:1fr}\n.chart-card{background:var(--white);border-radius:16px;padding:22px 24px;border:1px solid var(--border);box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}\n.chart-card:hover{box-shadow:var(--shadow-lift);border-color:#dcd1bc}\n.chart-card h3{font-family:var(--serif);font-size:15.5px;font-weight:600;color:var(--text);margin-bottom:5px;letter-spacing:-0.01em;line-height:1.25}\n.chart-card .src{font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:.005em;font-weight:500;line-height:1.45}\n.canvas-wrap{position:relative;height:220px}\n.canvas-wrap.tall{height:300px}\n.canvas-wrap.xtall{height:380px}\n\n/* ── NOTA (sin borde-acento tipo 'Claude') ─────────────────────────── */\n.nota{background:var(--sand2);border:1px solid var(--border);border-radius:12px;\n  padding:13px 16px 13px 42px;font-size:11.5px;color:var(--ink-soft);margin-top:16px;line-height:1.6;position:relative}\n.nota::before{content:\"i\";position:absolute;left:15px;top:13px;width:17px;height:17px;border-radius:50%;\n  background:var(--gold);color:#33280f;font-family:var(--serif);font-style:italic;font-weight:600;font-size:11px;\n  display:flex;align-items:center;justify-content:center;line-height:1}\n\n/* ── IPA ───────────────────────────────────────────────────────────── */\n.ipa-tabs{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap}\n.ipa-tab{padding:8px 18px;border-radius:999px;border:1px solid var(--border);background:var(--white);\n  font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--sans);color:var(--ink-soft);letter-spacing:-0.005em}\n.ipa-tab:hover{border-color:#cbbfa5;background:var(--sand2)}\n.ipa-tab.active{background:var(--navy);color:#F3EFE6;border-color:var(--navy);box-shadow:0 4px 14px -6px rgba(44,51,80,.5)}\n.ipa-view{display:none}.ipa-view.active{display:block}\n#ipa-scatter-wrap{position:relative;height:480px}\n\n.quad-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}\n.quad-card{border-radius:13px;padding:14px 16px;border:1px solid transparent}\n.quad-card h4{font-size:12.5px;font-weight:700;margin-bottom:5px;letter-spacing:-0.01em}\n.quad-card p{font-size:10.5px;line-height:1.5;opacity:.92}\n.qI{background:#F6E7E0;border-color:#E3C4B6;color:#8A3B27}\n.qII{background:#EBEEDF;border-color:#CDD3B0;color:#4a5730}\n.qIII{background:#F1EDE4;border-color:#DED5C4;color:#5b544a}\n.qIV{background:#F7EDD4;border-color:#E4D3A6;color:#7a5c18}\n\n.gap-table{width:100%;border-collapse:collapse;font-size:11.5px}\n.gap-table th{background:var(--navy);color:#F3EFE6;padding:10px 11px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em}\n.gap-table th:first-child{border-top-left-radius:10px}\n.gap-table th:last-child{border-top-right-radius:10px}\n.gap-table td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--ink-soft)}\n.gap-table tr:nth-child(even) td{background:var(--sand2)}\n.gap-table tr:hover td{background:#F3ECDD}\n.gap-bar-wrap{display:flex;align-items:center;gap:6px}\n.gap-bar{height:8px;border-radius:999px;min-width:2px}\n.qbadge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:9px;font-weight:700;color:#fff}\n.qbI{background:#B04A32}.qbII{background:#5F6E3B}.qbIII{background:#A99B87}.qbIV{background:#C79A45}\n\n.dim-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}\n.dim-chip{padding:5px 11px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.01em}\n.dD1{background:#E7EAF2;color:#2C3350}.dD2{background:#F7EDD4;color:#7a5c18}\n.dD3{background:#EBEEDF;color:#4a5730}.dD4{background:#F6E7E0;color:#8A3B27}\n.dD5{background:#ECE6F0;color:#6E5B87}\n\n/* ── S10 PERFILES ──────────────────────────────────────────────────── */\n.s10-msg{background:var(--sand2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:12.5px;color:var(--ink-soft);line-height:1.65;margin-bottom:22px}\n.s10-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px;flex-wrap:wrap}\n.s10-tag{display:inline-flex;align-items:center;gap:8px;border-radius:999px;background:var(--white);border:1px solid var(--border);padding:8px 14px;color:var(--text);font-size:11px;font-weight:700;white-space:nowrap;box-shadow:var(--shadow)}\n.s10-dot{width:9px;height:9px;border-radius:50%;background:var(--accent,var(--navy));display:inline-block}\n.s10-story p{font-size:13px;line-height:1.8;color:var(--ink-soft);margin-bottom:11px;text-wrap:pretty}\n.s10-story p:last-child{margin-bottom:0}\n.s10-story b{color:var(--text);font-weight:700}\n.s10-sub{font-size:12px;color:var(--muted);line-height:1.6}\n.s10-bar-row{margin-bottom:11px}\n.s10-bar-top{display:flex;justify-content:space-between;gap:10px;font-size:11.5px;color:var(--ink-soft);margin-bottom:5px}\n.s10-bar-top b{color:var(--text)}\n.s10-bar-track{height:8px;background:#EDE6D8;border-radius:999px;overflow:hidden}\n.s10-bar-fill{height:100%;border-radius:999px}\n.s10-money-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:16px}\n.s10-money{border-radius:12px;background:var(--sand2);border:1px solid var(--border);padding:12px 14px}\n.s10-money .val{font-size:18px;font-weight:700;color:var(--text);font-family:var(--serif);line-height:1.15;letter-spacing:-0.01em}\n.s10-money .lab{font-size:9.5px;color:var(--muted);margin-top:4px;line-height:1.35;text-transform:uppercase;letter-spacing:.04em;font-weight:600}\n.s10-lealtad-list{display:grid;gap:8px}\n.s10-lealtad-item{font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed var(--border);padding-bottom:7px}\n.s10-lealtad-item:last-child{border-bottom:none;padding-bottom:0}\n.s10-lealtad-item b{color:var(--text)}\n.s10-ipa-row{display:grid;grid-template-columns:56px minmax(0,1fr) 56px;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}\n.s10-ipa-row:last-child{border-bottom:none}\n.s10-code{font-size:9px;font-weight:700;color:#F3EFE6;background:var(--navy);border-radius:999px;padding:5px 6px;text-align:center;letter-spacing:.02em}\n.s10-gap-lbl{font-size:11.5px;color:var(--ink-soft);line-height:1.35}\n.s10-gap-mini{font-size:9.5px;color:var(--muted);margin-top:2px}\n.s10-gap-val{font-size:12px;text-align:right;font-weight:700;color:var(--coral)}\n.s10-compare-table{width:100%;border-collapse:collapse;font-size:12px}\n.s10-compare-table th{background:var(--navy);color:#F3EFE6;text-align:left;padding:10px 11px;font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}\n.s10-compare-table td{padding:10px 11px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--ink-soft)}\n.s10-compare-table tr:nth-child(even) td{background:var(--sand2)}\n\n/* generic card blocks reused in S10 (match .chart-card look) */\n#dc-root .card,#dc-root .panel{background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}\n\n/* ── GAP TABLE SORT ────────────────────────────────────────────────── */\n.gap-table th.sortable{cursor:pointer;user-select:none;white-space:nowrap}\n.gap-table th.sortable:hover{background:#3a4368}\n.sort-icon{margin-left:5px;opacity:.5;font-size:9px}\n.gap-table th.sort-asc .sort-icon::after{content:'▲';opacity:1}\n.gap-table th.sort-desc .sort-icon::after{content:'▼';opacity:1}\n.gap-table th .sort-icon::after{content:'⇅'}\n\n/* ── HAMBURGER / RESPONSIVE ────────────────────────────────────────── */\n#hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;width:42px;height:42px;\n  background:var(--navy);border-radius:11px;border:none;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:var(--shadow-lift)}\n#hamburger span{width:19px;height:2px;background:#F3EFE6;border-radius:2px}\n@media(max-width:1000px){\n  #sidebar{position:fixed;left:-288px;transition:left .3s}\n  #sidebar.open{left:0}\n  .indicador-grid{grid-template-columns:repeat(2,1fr)}\n  .g2,.g3{grid-template-columns:1fr}\n  .quad-cards{grid-template-columns:repeat(2,1fr)}\n  #hamburger{display:flex}\n  .main-inner{padding:0 20px 48px}\n  #topbar{padding:14px 20px 14px 66px}\n}\n@media print{\n  #sidebar,#topbar,#hamburger{display:none}\n  #dc-root{display:block}\n  .chart-card,.indicador{box-shadow:none}\n}\n\n<\u002Fstyle>\n<script src=\"03b2fb68-de9c-4fa6-83b1-7cdffb5ba24d\"><\u002Fscript>\n<\u002Fhelmet>\n<div id=\"dc-root\">\n<button id=\"hamburger\" data-toggle-sidebar=\"1\">\n  <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n<\u002Fbutton>\n\n<nav id=\"sidebar\">\n  <div class=\"sb-brand\">\n    <div class=\"sb-title\">Estudio de mercado turístico ZOIT · Región de Coquimbo<\u002Fdiv>\n    <div class=\"sb-bip\">Perfil del visitante y demanda sostenible<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"sb-zone\">\n    <div class=\"sb-zone-label\">Nivel de análisis<\u002Fdiv>\n    <button class=\"zone-btn active\" data-zone=\"combinado\" data-zone-btn=\"combinado\">\n      <span class=\"zd zd-c\"><\u002Fspan>Combinado\n    <\u002Fbutton>\n    <button class=\"zone-btn\" data-zone=\"valleElqui\" data-zone-btn=\"valleElqui\">\n      <span class=\"zd zd-v\"><\u002Fspan>Valle del Elqui\n    <\u002Fbutton>\n    <button class=\"zone-btn\" data-zone=\"pichidangui\" data-zone-btn=\"pichidangui\">\n      <span class=\"zd zd-p\"><\u002Fspan>Pichidangui–Quilimarí\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"sb-zone\" id=\"sb-segment\">\n    <div class=\"sb-zone-label\">Segmento por valoración sostenible<\u002Fdiv>\n    <button class=\"zone-btn active\" data-seg=\"todos\" data-seg-btn=\"todos\">\n      <span class=\"zd zd-todos\"><\u002Fspan>Todos\n    <\u002Fbutton>\n    <button class=\"zone-btn\" data-seg=\"alta\" data-seg-btn=\"alta\">\n      <span class=\"zd zd-alta\"><\u002Fspan>Alta orientación\n    <\u002Fbutton>\n    <button class=\"zone-btn\" data-seg=\"moderada\" data-seg-btn=\"moderada\">\n      <span class=\"zd zd-moderada\"><\u002Fspan>Moderada\n    <\u002Fbutton>\n    <button class=\"zone-btn\" data-seg=\"baja\" data-seg-btn=\"baja\">\n      <span class=\"zd zd-baja\"><\u002Fspan>Baja orientación\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"sb-nav\">\n    <button class=\"nav-item\" data-sec=\"s1\"><span class=\"nav-num\">1<\u002Fspan>Perfil sociodemográfico<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s2\"><span class=\"nav-num\">2<\u002Fspan>Caracterización del viaje<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s3\"><span class=\"nav-num\">3<\u002Fspan>Gasto turístico<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s4\"><span class=\"nav-num\">4<\u002Fspan>Planificación y decisión<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s5\"><span class=\"nav-num\">5<\u002Fspan>Experiencia en destino<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s6\"><span class=\"nav-num\">6<\u002Fspan>Calidad percibida IPA<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s7\"><span class=\"nav-num\">7<\u002Fspan>Sostenibilidad<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s8\"><span class=\"nav-num\">8<\u002Fspan>Sostenibilidad y DAP<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s9\"><span class=\"nav-num\">9<\u002Fspan>Intención futura<\u002Fbutton>\n    <button class=\"nav-item\" data-sec=\"s10\"><span class=\"nav-num\">10<\u002Fspan>Perfiles por segmento<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"sb-footer\">\n    Muestra efectiva: 196 casos<br>Valle del Elqui n=100 · Pichidangui–Quilimarí n=96<br>Trabajo de campo, 2026\n  <\u002Fdiv>\n<\u002Fnav>\n\n<div id=\"main\">\n  <div id=\"topbar\">\n    <div class=\"tb-title\" id=\"tb-title\">Perfil sociodemográfico<\u002Fdiv>\n    <div class=\"tb-badges\">\n      <span class=\"badge badge-zone\" id=\"badge-zone\">Combinado<\u002Fspan>\n      <span class=\"badge badge-n\" id=\"badge-n\">n = 196<\u002Fspan>\n      <span class=\"badge badge-segmento\" id=\"badge-segmento\">Todos los segmentos<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"main-inner\">\n\n\n<div class=\"section\" id=\"s1\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num\">01<\u002Fdiv>\n    <div class=\"sec-titles\">\n      <h2>Perfil sociodemográfico del visitante<\u002Fh2>\n      <p>Caracterización ta\">Nota metodológica: los porcentajes se calculan sobre la base válida de visitantes que pernoctan o declaran alojamiento, no sobre el n total de la zona. Bases: combinado n=146; Valle del Elqui n=61; Pichidangui–Quilimarí n=85.<\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"section\" id=\"s3\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num\">03<\u002Fdiv>\n    <div class=\"sec-titles\">\n      <h2>Gasto turístico por persona<\u002Fh2>\n      <p>Distribución del gasto declarado y medias estimadas por punto medio de rango<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"indicador-grid\">\n    <div class=\"indicador\" style=\"--accent:var(--navy)\">\n      <div class=\"indicador-val\" id=\"indicador-gastoaloj\" style=\"font-size:22px\">$<span id=\"kv-aloj\">22.624<\u002Fspan><\u002Fdiv>\n      <div class=\"indicador-label\">Gasto medio estimado por visitante en alojamiento<\u002Fdiv>\n      <div class=\"indicador-sub\">Incluye visita de día o alojamiento sin costo como $0<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--mint)\">\n      <div class=\"indicador-val\" id=\"indicador-gastoalim\" style=\"font-size:22px\">$<span id=\"kv-alim\">32.566<\u002Fspan><\u002Fdiv>\n      <div class=\"indicador-label\">Gasto medio estimado diario en alimentación<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--coral)\">\n      <div class=\"indicador-val\" id=\"indicador-gastototal\" style=\"font-size:22px\">$<span id=\"kv-total\">52.130<\u002Fspan><\u002Fdiv>\n      <div class=\"indicador-label\">Gasto diario total estimado<\u002Fdiv>\n      <div class=\"indicador-sub\">Promedio integrado; no suma simple de medias<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--gold)\">\n      <div class=\"indicador-val\">41%<\u002Fdiv>\n      <div class=\"indicador-label\">Mayor tramo alimentación<\u002Fdiv>\n      <div class=\"indicador-sub\" id=\"indicador-alimcat\">$25.001–$50.000/día<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"nota\">El gasto medio en alojamiento se interpreta como una estimación por visitante válido, incorporando como $0 los casos de visita de día o alojamiento sin costo. Por ello, no representa el gasto promedio exclusivamente entre quienes pagan alojamiento. Las estimaciones se calculan a partir del punto medio de cada rango declarado y excluyen respuestas “No sabe / No responde”. El gasto diario total estimado se presenta como una estimación integrada; no debe interpretarse como la suma directa de las medias marginales de alojamiento y alimentación.<\u002Fdiv>\n  <div class=\"chart-grid g2\">\n    <div class=\"chart-card\">\n      <h3>Distribución del gasto estimado en alojamiento<\u002Fh3>\n      <div class=\"src\">Estimación por punto medio de rango; incluye visita de día o sin costo como $0 y excluye NS/NR<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-gnoche\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Gasto estimado diario en alimentación<\u002Fh3>\n      <div class=\"src\">Gasto diario estimado en alimentación<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-galim\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chart-grid g2\">\n    <div class=\"chart-card\">\n      <h3>Gasto total estimado en actividades durante el viaje<\u002Fh3>\n      <div class=\"src\">Gasto total del viaje destinado a actividades<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-gact\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Gasto total estimado en productos locales y artesanía<\u002Fh3>\n      <div class=\"src\">Gasto total en productos locales y artesanía<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-gprod\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<div class=\"section\" id=\"s4\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num cent:var(--gold)\">\n      <div class=\"indicador-val\" id=\"indicador-actprod\">44%<\u002Fdiv>\n      <div class=\"indicador-label\">Compra productos locales/artesanía<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  \n  <div class=\"chart-grid g2\" id=\"motivo-grid-dual\" style=\"display:none\">\n    <div class=\"chart-card\">\n      <h3>Motivo de visita — Valle del Elqui<\u002Fh3>\n      <div class=\"src\">Valle del Elqui (n=100)<\u002Fdiv>\n      <div class=\"canvas-wrap tall\"><canvas id=\"ch-motvo-ve\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Motivo de visita — Pichidangui–Quilimarí<\u002Fh3>\n      <div class=\"src\">Pichidangui–Quilimarí (n=96)<\u002Fdiv>\n      <div class=\"canvas-wrap tall\"><canvas id=\"ch-motvo-pq\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  \n  <div class=\"chart-grid g1\" id=\"motivo-grid-single\">\n    <div class=\"chart-card\">\n      <h3 id=\"ch-motivo-title\">Motivo principal de visita<\u002Fh3>\n      <div class=\"src\">Motivo principal en la zona seleccionada<\u002Fdiv>\n      <div class=\"canvas-wrap tall\"><canvas id=\"ch-motivo\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n\n  \n  <div class=\"chart-grid g2\" id=\"actividad-grid-dual\" style=\"display:none\">\n    <div class=\"chart-card\">\n      <h3>Actividades realizadas o planificadas — Valle del Elqui<\u002Fh3>\n      <div class=\"src\">Multirespuesta; porcentaje sobre n=100<\u002Fdiv>\n      <div class=\"canvas-wrap xtall\"><canvas id=\"ch-actividades-ve\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Actividades realizadas o planificadas — Pichidangui–Quilimarí<\u002Fh3>\n      <div class=\"src\">Multirespuesta; porcentaje sobre n=96<\u002Fdiv>\n      <div class=\"canvas-wrap xtall\"><canvas id=\"ch-actividades-pq\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  \n  <div class=\"chart-grid g1\" id=\"actividad-grid-single\">\n    <div class=\"chart-card\">\n      <h3 id=\"ch-actividades-title\">Actividades realizadas o planificadas durante la visita<\u002Fh3>\n      <div class=\"src\" id=\"src-actividades\">Multirespuesta; porcentaje sobre el n de la zona activa<\u002Fdiv>\n      <div class=\"canvas-wrap xtall\"><canvas id=\"ch-actividades\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"nota\">En la vista combinada, esta pregunta se presenta separada por ZOIT porque incorpora actividades específicas de cada zona. Los porcentajes corresponden al total de encuestados de cada zona y, por tratarse de una pregunta multirespuesta, no suman 100%.<\u002Fdiv>\n  <div class=\"chart-grid g2\">\n    <div class=\"chart-card\">\n      <h3>Uso de establecimientos gastronómicos en el destino<\u002Fh3>\n      <div class=\"src\">Uso de establecimientos gastronómicos en el destino<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-come22\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Tipo de establecimiento gastronómico visitado<\u002Fh3>\n      <div class=\"src\">Multirespuesta; porcentaje sobre el n de la zona<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-tipoestab\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<div class=\"section\" id=\"s6\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num\">06<\u002Fdiv>\n    <div class=\"sec-titles\">\n      <h2>Calidad percibida del destino — Análisis IPA<\u002Fh2>\n      <p>Importancia vs. desempeño · 18 atributos · 5 dimensiones · ejes data-centered<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ipa-tabs\">\n    <button class=\"ipa-tab active\" data-ipaview=\"scatter\">Matriz IPA<\u002Fbutton>\n    <button class=\"ipa-tab\" data-ipaview=\"ranking\">Ranking de brechas<\u002Fbutton>\n  <\u002Fdiv>\n\n  \n  <div class=\"sb-zone\" style=\"background:var(--sand);border-radius:10px;margin-bottom:16px;padding:12px 14px\">\n    <div class=\"sb-zone-label\" style=\"color:var(--muted)\">Vista IPA (independiente del selector global)<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:8px\">\n      <button class=\"ipa-tab active\" id=\"ipa-z-btn-c\" data-ipazona=\"combinado\">Combinado<\u002Fbutton>\n      <button class=\"ipa-tab\" id=\"ipa-z-btn-v\" data-ipazona=\"valleElqui\">Valle del Elqui<\u002Fbutton>\n      <button class=\"ipa-tab\" id=\"ipa-z-btn-p\" data-ipazona=\"pichidangui\">Pichidangui–Quilimarí<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"dim-legend\">\n    <span class=\"dim-chip dD1\">D1 Alojamiento (A01–A06)<\u002Fspan>\n    <span class=\"dim-chip dD2\">D2 Gastronomía (A07–A11)<\u002Fspan>\n    <span class=\"dim-chip dD3\">D3 Actividades (A12–A14)<\u002Fspan>\n    <span class=\"dim-chip dD4\">D4 Sostenibilidad (A15–A16)<\u002Fspan>\n    <span class=\"dim-chip dD5\">D5 Información (A17–A18)<\u002Fspan>\n  <\u002Fdiv>\n\n  \n  <div class=\"ipa-view active\" id=\"ipav-scatter\">\n    <div class=\"chart-card\">\n      <h3 id=\"ipa-scatter-title\">Matriz IPA — Combinado (n=196)<\u002Fh3>\n      <div class=\"src\">Ejes data-centered: el cruce se ubica en la media de medias, no en el punto teórico 3,0 (Bacon, 2003)<\u002Fdiv>\n      <div id=\"ipa-scatter-wrap\"><canvas id=\"ch-ipa-scatter\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quad-cards\">\n      <div class=\"quad-card qI\">\n        <h4>I — Concentrarse aquí<\u002Fh4>\n        <p>Alta importancia · Bajo desempeño. Prioridad máxima de intervención.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"quad-card qII\">\n        <h4>II — Mantener el buen trabajo<\u002Fh4>\n        <p>Alta importancia · Alto desempeño. Fortaleza del destino, mantener inversión.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"quad-card qIII\">\n        <h4>III — Baja prioridad<\u002Fh4>\n        <p>Baja importancia · Bajo desempeño. No urgente, monitoreo de largo plazo.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"quad-card qIV\">\n        <h4>IV — Posible desperdicio<\u002Fh4>\n        <p>Baja importancia · Alto desempeño. Posible sobreinversión relativa.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n      <div class=\"nota\">Las medias de desempeño excluyen observaciones vacías (exclusión por pares), consistente con la instrucción del instrumento de omitir atributos no utilizados. La fiabilidad del instrumento fue verificada mediante alfa de Cronbach (D1–D3) y ρ de Spearman (D4–D5). Las líneas discontinuas azules indican los valores 4 de la escala (Importante en importancia / Bueno en desempeño) como referencia contextual; los ejes que definen los cuadrantes son las medias data-centered (Bacon, 2003).<\u002Fdiv>\n  \n  <div class=\"ipa-view\" id=\"ipav-ranking\">\n    <div class=\"chart-card\">\n      <h3 id=\"ipa-ranking-title\">Ranking de brechas — Combinado (mayor déficit primero)<\u002Fh3>\n      <div class=\"src\">Brecha = Desempeño − Importancia. Negativo = déficit de calidad percibida.<\u002Fdiv>\n      <div style=\"overflow-x:auto;margin-top:10px\">\n        <table class=\"gap-table\" id=\"gap-table\">\n          <thead><tr>\n            <th class=\"sortable\" data-col=\"rank\" data-type=\"num\">#<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n            <th class=\"sortable\" data-col=\"lbl\" data-type=\"str\">Atributo<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n            <th class=\"sortable\" data-col=\"dim\" data-type=\"str\">Dim<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n            <th class=\"sortable\" data-col=\"quad\" data-type=\"str\">Cuadrante<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n            <th class=\"sortable\" data-col=\"imp\" data-type=\"num\">Imp.<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n            <th class=\"sortable\" data-col=\"des\" data-type=\"num\">Des.<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n            <th class=\"sortable\" data-col=\"gap\" data-type=\"num\">Brecha<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n            <th style=\"min-width:80px\">Visual<\u002Fth>\n            <th class=\"sortable\" data-col=\"nd\" data-type=\"num\">n Des.<span class=\"sort-icon\"><\u002Fspan><\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody id=\"gap-tbody\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n      <div class=\"nota\">La tabla se ordena de mayor a menor déficit (brecha más negativa primero). Los atributos en cuadrante I (rojo) son la prioridad estratégica. El n de desempeño varía por atributo debido a la exclusión de evaluaciones \"No usó\".<\u002Fdiv>\n\n<div class=\"section\" id=\"s7\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num\">07<\u002Fdiv>\n    <div class=\"sec-titles\">\n      <h2>Evaluación de sostenibilidad<\u002Fh2>\n      <p>Calificación general del destino en prácticas responsables<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"indicador-grid\">\n    <div class=\"indicador\" style=\"--accent:var(--mint)\">\n      <div class=\"indicador-val\" id=\"indicador-sost-bueno\">56%<\u002Fdiv>\n      <div class=\"indicador-label\">Califica como \"Bueno\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--teal)\">\n      <div class=\"indicador-val\" id=\"indicador-sost-exbuen\">69%<\u002Fdiv>\n      <div class=\"indicador-label\">Excelente + Bueno<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--coral)\">\n      <div class=\"indicador-val\" id=\"indicador-sost-def\">6%<\u002Fdiv>\n      <div class=\"indicador-label\">Califica como \"Deficiente\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--gold)\">\n      <div class=\"indicador-val\" id=\"indicador-sost-sininfo\">5%<\u002Fdiv>\n      <div class=\"indicador-label\">Sin información suficiente<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chart-grid g2\">\n    <div class=\"chart-card\">\n      <h3>Calificación global de la oferta turística sostenible del destino<\u002Fh3>\n      <div class=\"src\">Escala: excelente, bueno, aceptable, deficiente, muy deficiente o sin información<\u002Fdiv>\n      <div class=\"canvas-wrap tall\"><canvas id=\"ch-sost26\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Importancia del entorno natural y prácticas sostenibles al elegir el destino<\u002Fh3>\n      <div class=\"src\">Factor de decisión al elegir el destino turístico<\u002Fdiv>\n      <div class=\"canvas-wrap tall\"><canvas id=\"ch-sost18b\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<div class=\"section\" id=\"s8\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num\">08<\u002Fdiv>\n    <div class=\"sec-titles\">\n      <h2>Sostenibilidad y Disposición a Pagar<\u002Fh2>\n      <p>Prácticas responsables y disposición a pagar un adicional<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"indicador-grid\">\n    <div class=\"indicador\" style=\"--accent:var(--navy)\">\n      <div class=\"indicador-val\" id=\"indicador-pref-rest-b\">41%<\u002Fdiv>\n      <div class=\"indicador-label\">Prefiere restaurante con prácticas responsables<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--mint)\">\n      <div class=\"indicador-val\" id=\"indicador-pref-aloj-b\">44%<\u002Fdiv>\n      <div class=\"indicador-label\">Prefiere alojamiento con prácticas responsables<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--coral)\">\n      <div class=\"indicador-val\" id=\"indicador-dap-rest-paga\">64%<\u002Fdiv>\n      <div class=\"indicador-label\">Pagaría algo más por restaurante responsable<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--gold)\">\n      <div class=\"indicador-val\" id=\"indicador-dap-aloj-paga\">51%<\u002Fdiv>\n      <div class=\"indicador-label\">Pagaría algo más por alojamiento responsable<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chart-grid g2\">\n    <div class=\"chart-card\">\n      <h3>Preferencia entre restaurante estándar y restaurante con prácticas responsables<\u002Fh3>\n      <div class=\"src\">Elección entre oferta estándar y con prácticas responsables<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-pref-rest\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Disposición a pagar adicional en restaurante con prácticas responsables<\u002Fh3>\n      <div class=\"src\">Disposición a pagar un adicional en restaurante responsable<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-dap-rest\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chart-grid g2\">\n    <div class=\"chart-card\">\n      <h3>Preferencia entre alojamiento estándar y alojamiento con prácticas responsables<\u002Fh3>\n      <div class=\"src\">Elección entre alojamiento estándar y con prácticas responsables<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-pref-aloj\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Disposición a pagar adicional por noche en alojamiento con prácticas responsables<\u002Fh3>\n      <div class=\"src\">Disposición a pagar un adicional por noche en alojamiento responsable<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-dap-aloj\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<div class=\"section\" id=\"s9\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num\">09<\u002Fdiv>\n    <div class=\"sec-titles\">\n      <h2>Intención futura y lealtad<\u002Fh2>\n      <p>Probabilidad de regreso, recomendación y disposición a gastar más<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"indicador-grid\">\n    <div class=\"indicador\" style=\"--accent:var(--navy)\">\n      <div class=\"indicador-val\" id=\"indicador-nps\">88<\u002Fdiv>\n      <div class=\"indicador-label\">NPS proxy<\u002Fdiv>\n      <div class=\"indicador-sub\">Promotores − Detractores × 100 / n<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--mint)\">\n      <div class=\"indicador-val\" id=\"indicador-regreso-alt\">80%<\u002Fdiv>\n      <div class=\"indicador-label\">Probabilidad regreso Alta o Muy alta<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--coral)\">\n      <div class=\"indicador-val\" id=\"indicador-recomienda-alt\">89%<\u002Fdiv>\n      <div class=\"indicador-label\">Probabilidad recomendación Alta o Muy alta<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"indicador\" style=\"--accent:var(--gold)\">\n      <div class=\"indicador-val\" id=\"indicador-gasto-si\">78%<\u002Fdiv>\n      <div class=\"indicador-label\">Gastaría más si mayor calidad/sostenibilidad<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chart-grid g2\">\n    <div class=\"chart-card\">\n      <h3>Probabilidad de regresar al destino en los próximos dos años<\u002Fh3>\n      <div class=\"src\">Probabilidad de regreso en los próximos dos años<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-regreso\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chart-card\">\n      <h3>Probabilidad de recomendar el destino a familiares o amigos<\u002Fh3>\n      <div class=\"src\">Base del cálculo del NPS proxy<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-recomienda\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chart-grid g1\">\n    <div class=\"chart-card\">\n      <h3>Disposición a gastar más si el destino mejorara en calidad y prácticas responsables<\u002Fh3>\n      <div class=\"src\">Pregunta hipotética de intención de gasto condicional<\u002Fdiv>\n      <div class=\"canvas-wrap\"><canvas id=\"ch-gasto-mas\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<div class=\"section\" id=\"s10\">\n  <div class=\"sec-head\">\n    <div class=\"sec-num\">10<\u002Fdiv>\n    <div class=\"sec-titles\">\n      <h2>Perfiles del visitante por segmento<\u002Fh2>\n      <p>Síntesis por segmento — se actualiza con los filtros de Territorio y Segmento de la barra lateral<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"s10-msg\" id=\"s10-todos-msg\">\n    Selecciona un segmento específico (Alta, Moderada o Baja orientación sostenible) en la barra lateral para ver su perfil completo. Mientras tanto, aquí tienes la comparación entre los tres segmentos del territorio activo.\n  <\u002Fdiv>\n\n  <div id=\"s10-profile\" style=\"display:none\">\n    <div class=\"chart-card\" style=\"margin-bottom:18px\" id=\"s10-hero\">\n      <div class=\"s10-head\">\n        <h3 id=\"s10-title\" style=\"font-size:18px;margin-bottom:0\">Perfil: —<\u002Fh3>\n        <span class=\"s10-tag\"><span class=\"s10-dot\" id=\"s10-dot\"><\u002Fspan><span id=\"s10-tag-text\">—<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"s10-story\" id=\"s10-story\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"indicador-grid\" id=\"s10-kpis\"><\u002Fdiv>\n\n    <div class=\"chart-grid g2\">\n      <div class=\"chart-card\">\n        <h3>Sostenibilidad y Disposición a Pagar (DAP)<\u002Fh3>\n        <div class=\"src\">Seis componentes del índice, expresados como % con postura favorable<\u002Fdiv>\n        <div id=\"s10-components\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chart-card\">\n        <h3>Gasto, Disposición a Pagar (DAP) y lealtad<\u002Fh3>\n        <div class=\"s10-money-grid\" id=\"s10-money\"><\u002Fdiv>\n        <div class=\"s10-lealtad-list\" id=\"s10-lealtad\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chart-grid g2\">\n      <div class=\"chart-card\">\n        <h3>Motivaciones y actividades<\u002Fh3>\n        <div class=\"src\">Motivo principal y actividades más frecuentes del segmento<\u002Fdiv>\n        <div id=\"s10-motiv-act\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chart-card\">\n        <h3>Brechas de experiencia percibida (IPA)<\u002Fh3>\n        <div class=\"src\">Mayor distancia entre importancia y desempeño, dentro del segmento<\u002Fdiv>\n        <div id=\"s10-ipa-gaps\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"chart-grid g3\">\n      <div class=\"chart-card\"><h3>Capital humano<\u002Fh3><p class=\"s10-sub\" id=\"s10-rec-humano\"><\u002Fp><\u002Fdiv>\n      <div class=\"chart-card\"><h3>Oferta de servicios<\u002Fh3><p class=\"s10-sub\" id=\"s10-rec-oferta\"><\u002Fp><\u002Fdiv>\n      <div class=\"chart-card\"><h3>Gestión territorial<\u002Fh3><p class=\"s10-sub\" id=\"s10-rec-territorio\"><\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"chart-card\" style=\"margin-top:4px\">\n    <h3>Comparación ejecutiva entre segmentos — <span id=\"s10-zone-label\"><\u002Fspan><\u002Fh3>\n    <div class=\"src\">Tamaño, gasto, Disposición a Pagar (DAP), lealtad y principal brecha IPA por segmento<\u002Fdiv>\n    <div style=\"overflow-x:auto\"><table class=\"s10-compare-table\" id=\"s10-compare-table\"><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"nota\">Nota metodológica: el Índice de valoración sostenible se construye con seis componentes recodificados en escala 0–100 y promediados en partes iguales; los cortes de segmento son terciles globales de la muestra combinada (Baja &lt; 40,3 · Moderada 40,3–61,1 · Alta ≥ 61,1). La Disposición a Pagar (DAP) corresponde a disposición declarada ante servicios responsables, no a pago observado ni a monto en pesos. Los gastos medios se estiman mediante puntos medios de rangos declarados.<\u002Fdiv>\n<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    function wire(){\n      var scope = document.getElementById('dc-root') || document;\n      if (scope.__wired) return; scope.__wired = true;\n      scope.addEventListener('click', function(e){\n        var t;\n        if ((t = e.target.closest('[data-toggle-sidebar]'))){ var sb=document.getElementById('sidebar'); if(sb) sb.classList.toggle('open'); return; }\n        if ((t = e.target.closest('[data-zone-btn]'))){ if(window.setZone) window.setZone(t.getAttribute('data-zone-btn'), t); return; }\n        if ((t = e.target.closest('[data-seg-btn]'))){ if(window.setSegmento) window.setSegmento(t.getAttribute('data-seg-btn'), t); return; }\n        if ((t = e.target.closest('[data-ipazona]'))){ if(window.setIpaZona) window.setIpaZona(t.getAttribute('data-ipazona'), t); return; }\n        if ((t = e.target.closest('[data-ipaview]'))){ if(window.setIpaView) window.setIpaView(t.getAttribute('data-ipaview'), t); return; }\n        if ((t = e.target.closest('[data-sec]'))){ if(window.scrollSec) window.scrollSec(t.getAttribute('data-sec')); return; }\n      });\n    }\n    function boot(){\n      try { window.__initDashboard(); } catch(err){ console.error('init error', err); }\n      wire();\n    }\n    function loadDashboard(){\n      if (window.__dashScriptLoaded) { if (window.__initDashboard) boot(); return; }\n      window.__dashScriptLoaded = true;\n      var s = document.createElement('script');\n      s.src = (window.__resources && window.__resources.dashboardJs) || './dashboard.js';\n      s.onload = boot;\n      document.head.appendChild(s);\n    }\n    var tries = 0;\n    (function poll(){\n      if (window.Chart){ loadDashboard(); }\n      else if (tries++ < 300){ setTimeout(poll, 40); }\n    })();\n  }\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
